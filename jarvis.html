<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Jarvis" />
  <title>Jarvis</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #09090f; --surface: #111120; --surface2: #16162a;
      --border: #22203a; --border2: #2d2a48;
      --text: #e4e0d8; --text2: #8a85a0; --text3: #3d3a55;
      --accent: #7c5cbf; --accent2: #5b4d8a;
      --green: #4ade80; --blue: #60a5fa; --pink: #f472b6;
      --orange: #fb923c; --purple: #a78bfa; --red: #f87171; --yellow: #fbbf24;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    html, body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Serif Display', Georgia, serif;
      min-height: 100vh; overscroll-behavior: none;
    }
    #app { max-width: 640px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

    .header {
      background: linear-gradient(160deg, #0f0e1e 0%, #1a1430 100%);
      border-bottom: 1px solid var(--border);
      padding: calc(var(--safe-top) + 20px) 22px 18px;
      position: sticky; top: 0; z-index: 10;
    }
    .header-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 5px; color: var(--accent); text-transform: uppercase; margin-bottom: 6px; }
    .header-row { display: flex; justify-content: space-between; align-items: flex-end; }
    .header h1 { font-size: 22px; font-weight: 400; color: #f0ece4; letter-spacing: -0.3px; line-height: 1.2; }
    .pending-badge { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); background: rgba(124,92,191,0.12); border: 1px solid rgba(124,92,191,0.25); padding: 3px 10px; border-radius: 20px; white-space: nowrap; }

    .capture-area { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 22px; }
    textarea {
      width: 100%; min-height: 80px; background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 12px; color: var(--text); font-size: 15px;
      font-family: 'DM Serif Display', Georgia, serif; padding: 13px 15px;
      resize: none; outline: none; line-height: 1.6; transition: border-color 0.2s; -webkit-appearance: none;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--text3); font-style: italic; }

    .capture-selects { display: flex; gap: 8px; margin-top: 10px; }
    .capture-selects select {
      flex: 1; background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 8px; color: var(--text2); font-size: 12px;
      font-family: 'DM Mono', monospace; padding: 7px 10px; cursor: pointer;
      -webkit-appearance: none; appearance: none; outline: none;
    }
    .capture-selects select:focus { border-color: var(--accent); }

    .capture-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; gap: 8px; }
    .capture-left { display: flex; align-items: center; gap: 8px; }

    .btn { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 1px; border-radius: 8px; cursor: pointer; transition: all 0.18s; border: none; -webkit-tap-highlight-color: transparent; }
    .btn-voice { background: var(--surface2); border: 1px solid var(--border2); color: var(--text2); padding: 9px 14px; display: flex; align-items: center; gap: 6px; }
    .btn-voice.active { background: rgba(248,113,113,0.1); border-color: var(--red); color: #fca5a5; }
    .btn-capture { background: linear-gradient(135deg, var(--accent2), var(--accent)); color: #f0ece4; padding: 9px 22px; flex-shrink: 0; }
    .btn-capture:disabled { background: var(--border2); color: var(--text3); cursor: not-allowed; }

    .pulse-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); animation: pulse 1s infinite; display: inline-block; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

    .flash { margin-top: 10px; padding: 8px 13px; border-radius: 7px; font-family: 'DM Mono', monospace; font-size: 12px; }
    .flash.success { background: #0f1f0f; border: 1px solid #1e3a1e; color: var(--green); }
    .flash.error { background: #1f0f0f; border: 1px solid #3a1e1e; color: var(--red); }

    .filters { padding: 12px 22px; border-bottom: 1px solid var(--border); display: flex; gap: 6px; flex-wrap: wrap; align-items: center; background: var(--bg); }
    .filter-btn { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.5px; padding: 4px 11px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text3); cursor: pointer; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
    .filter-btn.active { color: #f0ece4; border-color: var(--active-color, var(--accent)); background: color-mix(in srgb, var(--active-color, var(--accent)) 15%, transparent); }
    .filters-right { margin-left: auto; display: flex; align-items: center; }
    .show-done-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); cursor: pointer; display: flex; align-items: center; gap: 5px; }
    input[type=checkbox] { accent-color: var(--accent); }

    .task-list { padding: 14px 22px; display: flex; flex-direction: column; gap: 8px; flex: 1; padding-bottom: calc(var(--safe-bottom) + 30px); }
    .empty { text-align: center; padding: 60px 0; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text3); line-height: 2; }

    .task-card { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--cat-color, var(--accent)); border-radius: 10px; padding: 11px 13px; transition: opacity 0.2s; }
    .task-card.done { opacity: 0.4; border-left-color: var(--border2); }
    .task-main { display: flex; align-items: flex-start; gap: 9px; }
    .task-check { margin-top: 3px; flex-shrink: 0; width: 16px; height: 16px; cursor: pointer; accent-color: var(--cat-color, var(--accent)); }
    .priority-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
    .task-body { flex: 1; min-width: 0; }
    .task-title { font-size: 15px; color: var(--text); line-height: 1.4; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .task-card.done .task-title { text-decoration: line-through; color: var(--text3); }
    .task-notes { font-size: 12px; color: var(--text3); margin-top: 3px; font-style: italic; font-family: 'DM Mono', monospace; line-height: 1.4; }
    .task-controls { margin-top: 10px; display: flex; gap: 7px; flex-wrap: wrap; }
    select { background: var(--bg); border: 1px solid var(--border2); border-radius: 6px; color: var(--text2); font-size: 10px; font-family: 'DM Mono', monospace; padding: 4px 8px; cursor: pointer; -webkit-appearance: none; appearance: none; }
    .btn-delete { font-family: 'DM Mono', monospace; font-size: 10px; padding: 4px 10px; border-radius: 6px; background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.2); color: var(--red); cursor: pointer; }
    .task-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
    .cat-badge { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.5px; padding: 2px 7px; border-radius: 10px; white-space: nowrap; }
    .due-hint { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text3); }

    .spinner { display: inline-block; width: 10px; height: 10px; border: 2px solid var(--text3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 4px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-overlay { text-align: center; padding: 40px 0; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text3); }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-label">JARVIS // task intelligence</div>
    <div class="header-row">
      <h1>What's on your mind,<br>Daniel?</h1>
      <div class="pending-badge" id="pending-badge">— pending</div>
    </div>
  </div>

  <div class="capture-area">
    <textarea id="capture-input" placeholder="Type or speak your task..." rows="3"></textarea>
    <div class="capture-selects">
      <select id="capture-category">
        <option value="Personal">Personal</option>
        <option value="NRCS">NRCS</option>
        <option value="Church">Church</option>
        <option value="Writing">Writing</option>
        <option value="Counselling">Counselling</option>
        <option value="Urgent">Urgent</option>
      </select>
      <select id="capture-priority">
        <option value="medium">medium</option>
        <option value="high">high</option>
        <option value="low">low</option>
      </select>
    </div>
    <div class="capture-actions">
      <div class="capture-left">
        <button class="btn btn-voice" id="voice-btn" style="display:none">
          <span id="voice-icon">🎙️</span>
          <span id="voice-label">VOICE</span>
        </button>
        <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text3)">⌘+Enter to capture</span>
      </div>
      <button class="btn btn-capture" id="capture-btn" disabled>CAPTURE</button>
    </div>
    <div id="flash" style="display:none"></div>
  </div>

  <div class="filters" id="filters-bar">
    <button class="filter-btn active" data-filter="all" style="--active-color:#7c5cbf">All</button>
    <button class="filter-btn" data-filter="NRCS" style="--active-color:#4ade80">NRCS</button>
    <button class="filter-btn" data-filter="Church" style="--active-color:#60a5fa">Church</button>
    <button class="filter-btn" data-filter="Writing" style="--active-color:#f472b6">Writing</button>
    <button class="filter-btn" data-filter="Counselling" style="--active-color:#fb923c">Counselling</button>
    <button class="filter-btn" data-filter="Personal" style="--active-color:#a78bfa">Personal</button>
    <button class="filter-btn" data-filter="Urgent" style="--active-color:#f87171">Urgent</button>
    <div class="filters-right">
      <label class="show-done-label">
        <input type="checkbox" id="show-done-cb"> done
      </label>
    </div>
  </div>

  <div class="task-list" id="task-list">
    <div class="loading-overlay"><span class="spinner"></span> loading tasks...</div>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://kyqdjilhwfswnblqijpi.supabase.co";
  const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt5cWRqaWxod2Zzd25ibHFpanBpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMTg5OTEsImV4cCI6MjA5MTU5NDk5MX0.ZgpksG62auVEvnhDrS6780j-7RdnBdiyjOL31_4sBQg";

  const CATEGORIES = {
    NRCS:        { color: "#4ade80" },
    Church:      { color: "#60a5fa" },
    Writing:     { color: "#f472b6" },
    Counselling: { color: "#fb923c" },
    Personal:    { color: "#a78bfa" },
    Urgent:      { color: "#f87171" },
  };
  const PRIORITY_COLORS = { high: "#f87171", medium: "#fbbf24", low: "#6ee7b7" };

  let tasks = [];
  let activeFilter = "all";
  let showDone = false;
  let listening = false;
  let recognition = null;

  async function dbFetch(path, opts = {}) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
      ...opts,
      headers: {
        "apikey": SUPABASE_ANON,
        "Authorization": `Bearer ${SUPABASE_ANON}`,
        "Content-Type": "application/json",
        "Prefer": "return=representation",
        ...(opts.headers || {}),
      },
    });
    if (!res.ok) throw new Error(await res.text());
    const text = await res.text();
    return text ? JSON.parse(text) : null;
  }

  async function loadTasks() {
    try {
      const data = await dbFetch("tasks?order=created_at.desc&select=*");
      tasks = data || [];
      renderTasks();
      updateBadge();
    } catch (e) {
      document.getElementById("task-list").innerHTML = `<div class="empty">Could not load tasks.<br>${e.message}</div>`;
    }
  }

  async function insertTasks(newTasks) {
    const rows = newTasks.map(t => ({
      title: t.title, notes: t.notes || "",
      category: t.category || "Personal", priority: t.priority || "medium",
      due_hint: t.dueHint || null, done: false,
    }));
    return await dbFetch("tasks", { method: "POST", body: JSON.stringify(rows) });
  }

  async function updateTask(id, patch) {
    await dbFetch(`tasks?id=eq.${id}`, { method: "PATCH", body: JSON.stringify(patch) });
  }

  async function deleteTask(id) {
    await dbFetch(`tasks?id=eq.${id}`, { method: "DELETE" });
  }

  async function handleCapture() {
    const input = document.getElementById("capture-input").value.trim();
    if (!input) return;
    const category = document.getElementById("capture-category").value;
    const priority = document.getElementById("capture-priority").value;

    const btn = document.getElementById("capture-btn");
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>saving...';

    try {
      const inserted = await insertTasks([{ title: input, notes: "", category, priority, dueHint: null }]);
      tasks = [...(inserted || []), ...tasks];
      document.getElementById("capture-input").value = "";
      renderTasks();
      updateBadge();
      showFlash("✓ Task captured", "success");
    } catch (e) {
      showFlash("Error: " + e.message, "error");
    }

    btn.disabled = false;
    btn.textContent = "CAPTURE";
  }

  function initVoice() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return;
    recognition = new SR();
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.lang = "en-SG";
    recognition.onresult = (e) => {
      const t = Array.from(e.results).map(r => r[0].transcript).join("");
      document.getElementById("capture-input").value = t;
      updateCaptureBtn();
    };
    recognition.onend = () => setListening(false);
    recognition.onerror = (e) => {
      setListening(false);
      if (e.error !== "aborted") showFlash("Mic error: " + e.error, "error");
    };
    const voiceBtn = document.getElementById("voice-btn");
    voiceBtn.style.display = "flex";
    voiceBtn.addEventListener("click", () => {
      if (listening) { recognition.stop(); }
      else { document.getElementById("capture-input").value = ""; recognition.start(); setListening(true); }
    });
  }

  function setListening(val) {
    listening = val;
    const btn = document.getElementById("voice-btn");
    const icon = document.getElementById("voice-icon");
    const label = document.getElementById("voice-label");
    if (val) {
      btn.classList.add("active"); icon.textContent = "⏹";
      label.innerHTML = 'STOP <span class="pulse-dot"></span>';
    } else {
      btn.classList.remove("active"); icon.textContent = "🎙️"; label.textContent = "VOICE";
    }
  }

  function renderTasks() {
    const list = document.getElementById("task-list");
    const filtered = tasks.filter(t => {
      if (!showDone && t.done) return false;
      if (activeFilter !== "all" && t.category !== activeFilter) return false;
      return true;
    });
    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty">${tasks.length === 0 ? "No tasks yet.<br>Start capturing." : "Nothing here."}</div>`;
      return;
    }
    list.innerHTML = filtered.map(task => {
      const cat = CATEGORIES[task.category] || CATEGORIES.Personal;
      const pdot = PRIORITY_COLORS[task.priority] || PRIORITY_COLORS.medium;
      return `
      <div class="task-card${task.done ? " done" : ""}" style="--cat-color:${cat.color}" data-id="${task.id}">
        <div class="task-main">
          <input class="task-check" type="checkbox" ${task.done ? "checked" : ""} data-action="toggle" data-id="${task.id}">
          <span class="priority-dot" style="background:${pdot}"></span>
          <div class="task-body">
            <div class="task-title" data-action="expand" data-id="${task.id}">${escHtml(task.title)}</div>
            ${task.notes ? `<div class="task-notes">${escHtml(task.notes)}</div>` : ""}
            <div class="task-controls" id="ctrl-${task.id}" style="display:none">
              <select data-action="cat" data-id="${task.id}">
                ${Object.keys(CATEGORIES).map(k=>`<option value="${k}"${task.category===k?" selected":""}>${k}</option>`).join("")}
              </select>
              <select data-action="pri" data-id="${task.id}">
                ${["high","medium","low"].map(p=>`<option value="${p}"${task.priority===p?" selected":""}>${p}</option>`).join("")}
              </select>
              <button class="btn-delete" data-action="delete" data-id="${task.id}">delete</button>
            </div>
          </div>
          <div class="task-meta">
            <span class="cat-badge" style="background:${cat.color}18;color:${cat.color}">${task.category}</span>
            ${task.due_hint ? `<span class="due-hint">${task.due_hint}</span>` : ""}
          </div>
        </div>
      </div>`;
    }).join("");
  }

  function updateBadge() {
    const n = tasks.filter(t => !t.done).length;
    document.getElementById("pending-badge").textContent = `${n} pending`;
  }

  document.getElementById("task-list").addEventListener("click", async (e) => {
    const el = e.target.closest("[data-action]");
    if (!el) return;
    const { action, id } = el.dataset;
    if (action === "toggle") {
      const task = tasks.find(t => t.id === id);
      if (!task) return;
      task.done = !task.done;
      renderTasks(); updateBadge();
      await updateTask(id, { done: task.done });
    }
    if (action === "expand") {
      const ctrl = document.getElementById("ctrl-" + id);
      if (ctrl) ctrl.style.display = ctrl.style.display === "none" ? "flex" : "none";
    }
    if (action === "delete") {
      tasks = tasks.filter(t => t.id !== id);
      renderTasks(); updateBadge();
      await deleteTask(id);
    }
  });

  document.getElementById("task-list").addEventListener("change", async (e) => {
    const el = e.target.closest("[data-action]");
    if (!el) return;
    const { action, id } = el.dataset;
    if (action === "cat") {
      const task = tasks.find(t => t.id === id);
      if (task) { task.category = el.value; renderTasks(); await updateTask(id, { category: el.value }); }
    }
    if (action === "pri") {
      const task = tasks.find(t => t.id === id);
      if (task) { task.priority = el.value; renderTasks(); await updateTask(id, { priority: el.value }); }
    }
  });

  document.getElementById("filters-bar").addEventListener("click", (e) => {
    const btn = e.target.closest(".filter-btn");
    if (!btn) return;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = btn.dataset.filter;
    renderTasks();
  });

  document.getElementById("show-done-cb").addEventListener("change", (e) => {
    showDone = e.target.checked; renderTasks();
  });

  function updateCaptureBtn() {
    document.getElementById("capture-btn").disabled = !document.getElementById("capture-input").value.trim();
  }
  document.getElementById("capture-input").addEventListener("input", updateCaptureBtn);
  document.getElementById("capture-input").addEventListener("keydown", (e) => {
    if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) handleCapture();
  });
  document.getElementById("capture-btn").addEventListener("click", handleCapture);

  function showFlash(msg, type = "success") {
    const el = document.getElementById("flash");
    el.textContent = msg; el.className = `flash ${type}`; el.style.display = "block";
    setTimeout(() => { el.style.display = "none"; }, 3000);
  }

  function escHtml(str) {
    return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  initVoice();
  loadTasks();
</script>
</body>
</html>
