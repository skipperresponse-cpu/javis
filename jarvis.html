<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Jarvis" />
  <title>Jarvis</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #f5f4f0;
      --surface: #fff;
      --surface2: #f0efeb;
      --surface3: #e8e7e3;
      --border: #dddcd8;
      --border2: #cccbc7;
      --text: #111;
      --text2: #555;
      --text3: #999;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
      overscroll-behavior: none;
      -webkit-font-smoothing: antialiased;
    }

    #app { max-width: 600px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

    /* ── Header ── */
    .header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: calc(var(--safe-top) + 18px) 20px 16px;
      position: sticky; top: 0; z-index: 20;
    }
    .header-eyebrow { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 4px; color: var(--text3); text-transform: uppercase; margin-bottom: 8px; }
    .header-row { display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 20px; font-weight: 600; color: var(--text); letter-spacing: -0.5px; }
    .pending-badge { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text2); border: 1px solid var(--border2); padding: 4px 12px; border-radius: 20px; background: var(--surface); }

    /* ── Tabs ── */
    .tabs { display: flex; background: var(--bg); border-bottom: 1px solid var(--border); position: sticky; top: 72px; z-index: 19; }
    .tab { flex: 1; padding: 14px 0; text-align: center; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 1px; color: var(--text3); cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent; transition: all 0.2s; text-transform: uppercase; }
    .tab.active { color: var(--text); border-bottom-color: var(--text); }

    /* ── Capture ── */
    .capture-area { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 20px; }
    textarea {
      width: 100%; min-height: 80px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; color: var(--text); font-size: 16px;
      font-family: 'Inter', sans-serif; padding: 14px 16px;
      resize: none; outline: none; line-height: 1.6;
      transition: border-color 0.2s; -webkit-appearance: none;
    }
    textarea:focus { border-color: var(--border2); }
    textarea::placeholder { color: var(--text3); }

    /* Category pill selector */
    .cat-selector { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
    .cat-pill {
      padding: 7px 14px; border-radius: 20px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--text2);
      font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.5px;
      cursor: pointer; transition: all 0.15s; min-height: 36px;
      display: flex; align-items: center;
    }
    .cat-pill.selected { background: var(--text); color: var(--bg); border-color: var(--text); }

    .capture-row2 { display: flex; gap: 10px; margin-top: 10px; align-items: center; }
    .pri-select {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-size: 13px;
      font-family: 'DM Mono', monospace; padding: 10px 12px;
      cursor: pointer; -webkit-appearance: none; appearance: none; outline: none;
      min-height: 44px; min-width: 110px;
    }

    .btn-voice {
      min-height: 48px; min-width: 48px; padding: 0 16px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text2);
      font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 1px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      gap: 6px; transition: all 0.2s; flex-shrink: 0;
    }
    .btn-voice.active { background: #fff0f0; border-color: #f87171; color: #dc2626; }

    .btn-capture {
      flex: 1; min-height: 48px; background: var(--text); color: var(--bg);
      border: none; border-radius: 10px;
      font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 2px;
      font-weight: 500; cursor: pointer; transition: all 0.2s; text-transform: uppercase;
    }
    .btn-capture:disabled { background: var(--surface3); color: var(--text3); cursor: not-allowed; }
    .btn-capture:not(:disabled):active { opacity: 0.8; }

    .pulse-dot { width: 6px; height: 6px; border-radius: 50%; background: #dc2626; animation: pulse 1s infinite; display: inline-block; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

    .flash { margin-top: 10px; padding: 10px 14px; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 12px; }
    .flash.success { background: #f0faf0; border: 1px solid #86efac; color: #166534; }
    .flash.error { background: #fff0f0; border: 1px solid #fca5a5; color: #991b1b; }

    /* ── Filters + Sort bar ── */
    .filter-sort-bar {
      padding: 12px 20px; border-bottom: 1px solid var(--border);
      background: var(--bg); display: flex; flex-direction: column; gap: 10px;
    }
    .filter-scroll { display: flex; gap: 6px; overflow-x: auto; }
    .filter-scroll::-webkit-scrollbar { display: none; }
    .filter-btn {
      font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.5px;
      padding: 7px 14px; border-radius: 20px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text3); cursor: pointer; transition: all 0.15s;
      white-space: nowrap; min-height: 34px; flex-shrink: 0;
    }
    .filter-btn.active { color: var(--bg); border-color: var(--text); background: var(--text); }

    .sort-row { display: flex; align-items: center; gap: 8px; }
    .sort-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); white-space: nowrap; }
    .sort-select {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text2); font-size: 11px;
      font-family: 'DM Mono', monospace; padding: 6px 10px;
      cursor: pointer; -webkit-appearance: none; appearance: none; outline: none;
      min-height: 34px;
    }

    /* ── Task list ── */
    .task-list { padding: 12px 20px; display: flex; flex-direction: column; gap: 8px; flex: 1; padding-bottom: calc(var(--safe-bottom) + 40px); }
    .empty { text-align: center; padding: 60px 0; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text3); line-height: 2.2; }

    /* ── Task card ── */
    .task-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .task-card-main { display: flex; align-items: stretch; min-height: 60px; }
    .task-priority-bar { width: 4px; flex-shrink: 0; }
    .task-inner { flex: 1; padding: 14px 12px 14px 14px; display: flex; align-items: flex-start; gap: 12px; min-width: 0; }
    .task-check { width: 22px; height: 22px; flex-shrink: 0; cursor: pointer; accent-color: #111; margin-top: 2px; }
    .task-body { flex: 1; min-width: 0; }
    .task-title { font-size: 15px; font-weight: 400; color: var(--text); line-height: 1.4; word-break: break-word; }
    .task-subtitle { margin-top: 5px; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .task-cat-pill {
      font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.5px;
      padding: 2px 8px; border-radius: 10px; border: 1px solid var(--border);
      color: var(--text2); background: var(--surface2);
    }
    .task-pri-label { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text3); }
    .task-expand-btn {
      width: 40px; height: 40px; flex-shrink: 0; background: none; border: none;
      color: var(--text3); font-size: 20px; cursor: pointer; display: flex;
      align-items: center; justify-content: center; border-radius: 8px; transition: background 0.15s;
    }
    .task-expand-btn:active { background: var(--surface2); }

    .task-expanded { border-top: 1px solid var(--border); padding: 12px 14px; display: none; gap: 8px; flex-wrap: wrap; align-items: center; }
    .task-expanded.open { display: flex; }
    .task-expanded select {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 11px;
      font-family: 'DM Mono', monospace; padding: 8px 10px;
      cursor: pointer; -webkit-appearance: none; min-height: 36px;
    }

    /* ── Completed ── */
    .completed-header { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: center; background: var(--bg); }
    .select-all-label { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text2); display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .bulk-actions { margin-left: auto; display: flex; gap: 8px; }
    .btn-bulk { min-height: 36px; padding: 0 14px; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.5px; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--text2); }
    .btn-bulk.danger { background: #fff0f0; border-color: #fca5a5; color: #991b1b; }

    .completed-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
    .completed-check { width: 22px; height: 22px; flex-shrink: 0; cursor: pointer; accent-color: #111; }
    .completed-body { flex: 1; min-width: 0; }
    .completed-title { font-size: 15px; color: var(--text3); text-decoration: line-through; word-break: break-word; }
    .completed-meta { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text3); margin-top: 4px; text-transform: uppercase; }
    .completed-btns { display: flex; gap: 6px; flex-shrink: 0; }
    .btn-restore { min-height: 34px; padding: 0 12px; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 10px; cursor: pointer; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); }
    .btn-del { min-height: 34px; padding: 0 12px; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 10px; cursor: pointer; background: #fff0f0; border: 1px solid #fca5a5; color: #991b1b; }

    .spinner { display: inline-block; width: 10px; height: 10px; border: 2px solid var(--border2); border-top-color: var(--text); border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-overlay { text-align: center; padding: 40px 0; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text3); }
  </style>
</head>
<body>
<div id="app">

  <div class="header">
    <div class="header-eyebrow">JARVIS // task intelligence</div>
    <div class="header-row">
      <h1>Daniel's Tasks</h1>
      <div class="pending-badge" id="pending-badge">0 pending</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-active" onclick="switchTab('active')">Active</button>
    <button class="tab" id="tab-completed" onclick="switchTab('completed')">Completed</button>
  </div>

  <!-- Active view -->
  <div id="view-active">
    <div class="capture-area">
      <textarea id="capture-input" placeholder="What needs to get done?" rows="3"></textarea>

      <!-- Category pills -->
      <div class="cat-selector" id="cat-selector">
        <div class="cat-pill selected" data-cat="Personal">Personal</div>
        <div class="cat-pill" data-cat="NRCS">NRCS</div>
        <div class="cat-pill" data-cat="Church">Church</div>
        <div class="cat-pill" data-cat="Writing">Writing</div>
        <div class="cat-pill" data-cat="Counselling">Counselling</div>
        <div class="cat-pill" data-cat="SBC">SBC</div>
      </div>

      <div class="capture-row2">
        <select class="pri-select" id="capture-priority">
          <option value="low">● low</option>
          <option value="medium">● medium</option>
          <option value="high">● high</option>
        </select>
        <button class="btn-voice" id="voice-btn" style="display:none">
          <span id="voice-icon">🎙️</span>
          <span id="voice-label">VOICE</span>
        </button>
        <button class="btn-capture" id="capture-btn" disabled>CAPTURE</button>
      </div>
      <div id="flash" style="display:none"></div>
    </div>

    <div class="filter-sort-bar">
      <div class="filter-scroll" id="filters-bar">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="NRCS">NRCS</button>
        <button class="filter-btn" data-filter="Church">Church</button>
        <button class="filter-btn" data-filter="Writing">Writing</button>
        <button class="filter-btn" data-filter="Counselling">Counselling</button>
        <button class="filter-btn" data-filter="SBC">SBC</button>
        <button class="filter-btn" data-filter="Personal">Personal</button>
      </div>
      <div class="sort-row">
        <span class="sort-label">Sort by</span>
        <select class="sort-select" id="sort-select">
          <option value="date">Date added</option>
          <option value="priority">Priority</option>
          <option value="category">Category</option>
        </select>
      </div>
    </div>

    <div class="task-list" id="task-list">
      <div class="loading-overlay"><span class="spinner"></span> loading...</div>
    </div>
  </div>

  <!-- Completed view -->
  <div id="view-completed" style="display:none; flex-direction:column; flex:1">
    <div class="completed-header">
      <label class="select-all-label">
        <input type="checkbox" id="select-all-cb" onchange="toggleSelectAll(this.checked)">
        Select all
      </label>
      <div class="bulk-actions">
        <button class="btn-bulk" onclick="bulkRestore()">Restore</button>
        <button class="btn-bulk danger" onclick="bulkDelete()">Delete</button>
      </div>
    </div>
    <div class="task-list" id="completed-list">
      <div class="empty">No completed tasks yet.</div>
    </div>
  </div>

</div>

<script>
  const SUPABASE_URL = "https://kyqdjilhwfswnblqijpi.supabase.co";
  const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt5cWRqaWxod2Zzd25ibHFpanBpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMTg5OTEsImV4cCI6MjA5MTU5NDk5MX0.ZgpksG62auVEvnhDrS6780j-7RdnBdiyjOL31_4sBQg";

  const CATEGORIES = ["NRCS","Church","Writing","Counselling","SBC","Personal"];
  const PRI_BAR = { low: "#22c55e", medium: "#eab308", high: "#ef4444" };
  const CAT_BG = { NRCS: "#f0fdf4", Church: "#eff6ff", Writing: "#fdf4ff", Counselling: "#fff7ed", SBC: "#f5f3ff", Personal: "#fafaf9" };
  const PRI_ORDER = { low: 2, medium: 1, high: 0 };

  let tasks = [];
  let activeFilter = "all";
  let activeSort = "date";
  let selectedCategory = "Personal";
  let selectedCompleted = new Set();
  let currentTab = "active";
  let listening = false;
  let recognition = null;

  // ── DB ──
  async function dbFetch(path, opts = {}) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
      ...opts,
      headers: {
        "apikey": SUPABASE_ANON, "Authorization": `Bearer ${SUPABASE_ANON}`,
        "Content-Type": "application/json", "Prefer": "return=representation",
        ...(opts.headers || {}),
      },
    });
    if (!res.ok) throw new Error(await res.text());
    const text = await res.text();
    return text ? JSON.parse(text) : null;
  }

  async function loadTasks() {
    try {
      const data = await dbFetch("tasks?order=created_at.desc&select=*");
      tasks = data || [];
      renderActive(); renderCompleted(); updateBadge();
    } catch (e) {
      document.getElementById("task-list").innerHTML = `<div class="empty">Could not load.<br>${e.message}</div>`;
    }
  }

  async function insertTask(t) {
    return await dbFetch("tasks", {
      method: "POST",
      body: JSON.stringify([{ title: t.title, notes: "", category: t.category, priority: t.priority, due_hint: null, done: false }])
    });
  }

  async function updateTask(id, patch) {
    await dbFetch(`tasks?id=eq.${id}`, { method: "PATCH", body: JSON.stringify(patch) });
  }

  async function deleteTaskDb(id) {
    await dbFetch(`tasks?id=eq.${id}`, { method: "DELETE" });
  }

  // ── Capture ──
  async function handleCapture() {
    const input = document.getElementById("capture-input").value.trim();
    if (!input) return;
    const priority = document.getElementById("capture-priority").value;
    const btn = document.getElementById("capture-btn");
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>saving...';
    try {
      const inserted = await insertTask({ title: input, category: selectedCategory, priority });
      tasks = [...(inserted || []), ...tasks];
      document.getElementById("capture-input").value = "";
      updateCaptureBtn();
      renderActive(); updateBadge();
      showFlash("✓ Task captured", "success");
    } catch (e) { showFlash("Error: " + e.message, "error"); }
    btn.disabled = false; btn.textContent = "CAPTURE";
  }

  // ── Category pill selection ──
  document.getElementById("cat-selector").addEventListener("click", (e) => {
    const pill = e.target.closest(".cat-pill");
    if (!pill) return;
    document.querySelectorAll(".cat-pill").forEach(p => p.classList.remove("selected"));
    pill.classList.add("selected");
    selectedCategory = pill.dataset.cat;
  });

  // ── Mark done / restore ──
  async function markDone(id) {
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    task.done = true;
    renderActive(); renderCompleted(); updateBadge();
    await updateTask(id, { done: true });
  }

  async function restoreTask(id) {
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    task.done = false;
    selectedCompleted.delete(id);
    renderActive(); renderCompleted(); updateBadge();
    await updateTask(id, { done: false });
  }

  async function hardDelete(id) {
    tasks = tasks.filter(t => t.id !== id);
    selectedCompleted.delete(id);
    renderCompleted(); updateBadge();
    await deleteTaskDb(id);
  }

  // ── Bulk ──
  function toggleSelectAll(checked) {
    tasks.filter(t => t.done).forEach(t => checked ? selectedCompleted.add(t.id) : selectedCompleted.delete(t.id));
    renderCompleted();
  }

  async function bulkRestore() {
    if (!selectedCompleted.size) return;
    const ids = [...selectedCompleted];
    ids.forEach(id => { const t = tasks.find(x => x.id === id); if (t) t.done = false; });
    selectedCompleted.clear();
    renderActive(); renderCompleted(); updateBadge();
    await Promise.all(ids.map(id => updateTask(id, { done: false })));
  }

  async function bulkDelete() {
    if (!selectedCompleted.size) return;
    if (!confirm(`Delete ${selectedCompleted.size} task(s)? Cannot be undone.`)) return;
    const ids = [...selectedCompleted];
    tasks = tasks.filter(t => !ids.includes(t.id));
    selectedCompleted.clear();
    renderCompleted(); updateBadge();
    await Promise.all(ids.map(id => deleteTaskDb(id)));
  }

  // ── Sort ──
  function getSorted(list) {
    const s = [...list];
    if (activeSort === "priority") s.sort((a,b) => (PRI_ORDER[a.priority]??2) - (PRI_ORDER[b.priority]??2));
    else if (activeSort === "category") s.sort((a,b) => a.category.localeCompare(b.category));
    // date = default (already desc from DB)
    return s;
  }

  // ── Render active ──
  function renderActive() {
    const list = document.getElementById("task-list");
    let filtered = tasks.filter(t => {
      if (t.done) return false;
      if (activeFilter !== "all" && t.category !== activeFilter) return false;
      return true;
    });
    filtered = getSorted(filtered);

    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty">${tasks.filter(t=>!t.done).length===0 ? "All clear.<br>Add something above." : "Nothing in this category."}</div>`;
      return;
    }

    list.innerHTML = filtered.map(task => {
      const barColor = PRI_BAR[task.priority] || PRI_BAR.low;
      const catBg = CAT_BG[task.category] || CAT_BG.Personal;
      const priLabel = task.priority === "high" ? "● high" : task.priority === "medium" ? "● medium" : "● low";
      const priColor = task.priority === "high" ? "#dc2626" : task.priority === "medium" ? "#ca8a04" : "#16a34a";
      return `
      <div class="task-card" style="background:${catBg}" data-id="${task.id}">
        <div class="task-card-main">
          <div class="task-priority-bar" style="background:${barColor}"></div>
          <div class="task-inner">
            <input class="task-check" type="checkbox" data-action="done" data-id="${task.id}">
            <div class="task-body">
              <div class="task-title">${escHtml(task.title)}</div>
              <div class="task-subtitle">
                <span class="task-cat-pill">${task.category}</span>
                <span class="task-pri-label" style="color:${priColor}">${priLabel}</span>
              </div>
            </div>
            <button class="task-expand-btn" data-action="expand" data-id="${task.id}">⋯</button>
          </div>
        </div>
        <div class="task-expanded" id="exp-${task.id}">
          <select data-action="cat" data-id="${task.id}">
            ${CATEGORIES.map(k=>`<option value="${k}"${task.category===k?" selected":""}>${k}</option>`).join("")}
          </select>
          <select data-action="pri" data-id="${task.id}">
            ${["low","medium","high"].map(p=>`<option value="${p}"${task.priority===p?" selected":""}>${p}</option>`).join("")}
          </select>
        </div>
      </div>`;
    }).join("");
  }

  // ── Render completed ──
  function renderCompleted() {
    const list = document.getElementById("completed-list");
    const done = tasks.filter(t => t.done);
    if (done.length === 0) {
      list.innerHTML = `<div class="empty">No completed tasks yet.</div>`;
      document.getElementById("select-all-cb").checked = false;
      return;
    }
    list.innerHTML = done.map(task => `
      <div class="completed-card">
        <input class="completed-check" type="checkbox" ${selectedCompleted.has(task.id)?"checked":""}
          onchange="toggleSelect('${task.id}',this.checked)">
        <div class="completed-body">
          <div class="completed-title">${escHtml(task.title)}</div>
          <div class="completed-meta">${task.category} · ${task.priority}</div>
        </div>
        <div class="completed-btns">
          <button class="btn-restore" onclick="restoreTask('${task.id}')">Restore</button>
          <button class="btn-del" onclick="hardDelete('${task.id}')">Delete</button>
        </div>
      </div>`).join("");
  }

  function toggleSelect(id, checked) {
    checked ? selectedCompleted.add(id) : selectedCompleted.delete(id);
    const done = tasks.filter(t => t.done);
    document.getElementById("select-all-cb").checked = done.length > 0 && done.every(t => selectedCompleted.has(t.id));
  }

  function updateBadge() {
    const n = tasks.filter(t => !t.done).length;
    document.getElementById("pending-badge").textContent = `${n} pending`;
  }

  // ── Tab ──
  function switchTab(tab) {
    currentTab = tab;
    document.getElementById("view-active").style.display = tab === "active" ? "block" : "none";
    document.getElementById("view-completed").style.display = tab === "completed" ? "flex" : "none";
    document.getElementById("tab-active").classList.toggle("active", tab === "active");
    document.getElementById("tab-completed").classList.toggle("active", tab === "completed");
  }

  // ── Events ──
  document.getElementById("task-list").addEventListener("click", async (e) => {
    const el = e.target.closest("[data-action]");
    if (!el) return;
    const { action, id } = el.dataset;
    if (action === "done") await markDone(id);
    if (action === "expand") {
      const exp = document.getElementById("exp-" + id);
      if (exp) exp.classList.toggle("open");
    }
  });

  document.getElementById("task-list").addEventListener("change", async (e) => {
    const el = e.target.closest("[data-action]");
    if (!el) return;
    const { action, id } = el.dataset;
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    if (action === "cat") { task.category = el.value; renderActive(); await updateTask(id, { category: el.value }); }
    if (action === "pri") { task.priority = el.value; renderActive(); await updateTask(id, { priority: el.value }); }
  });

  document.getElementById("filters-bar").addEventListener("click", (e) => {
    const btn = e.target.closest(".filter-btn");
    if (!btn) return;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = btn.dataset.filter;
    renderActive();
  });

  document.getElementById("sort-select").addEventListener("change", (e) => {
    activeSort = e.target.value;
    renderActive();
  });

  function updateCaptureBtn() {
    document.getElementById("capture-btn").disabled = !document.getElementById("capture-input").value.trim();
  }
  document.getElementById("capture-input").addEventListener("input", updateCaptureBtn);
  document.getElementById("capture-input").addEventListener("keydown", (e) => {
    if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) handleCapture();
  });
  document.getElementById("capture-btn").addEventListener("click", handleCapture);

  // ── Voice ──
  function initVoice() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return;
    recognition = new SR();
    recognition.continuous = false; recognition.interimResults = true; recognition.lang = "en-SG";
    recognition.onresult = (e) => {
      document.getElementById("capture-input").value = Array.from(e.results).map(r => r[0].transcript).join("");
      updateCaptureBtn();
    };
    recognition.onend = () => setListening(false);
    recognition.onerror = (e) => { setListening(false); if (e.error !== "aborted") showFlash("Mic: " + e.error, "error"); };
    const btn = document.getElementById("voice-btn");
    btn.style.display = "flex";
    btn.addEventListener("click", () => {
      if (listening) { recognition.stop(); }
      else { document.getElementById("capture-input").value = ""; recognition.start(); setListening(true); }
    });
  }

  function setListening(val) {
    listening = val;
    document.getElementById("voice-icon").textContent = val ? "⏹" : "🎙️";
    document.getElementById("voice-label").innerHTML = val ? 'STOP <span class="pulse-dot"></span>' : "VOICE";
    document.getElementById("voice-btn").classList.toggle("active", val);
  }

  function showFlash(msg, type = "success") {
    const el = document.getElementById("flash");
    el.textContent = msg; el.className = `flash ${type}`; el.style.display = "block";
    setTimeout(() => el.style.display = "none", 3000);
  }

  function escHtml(str) {
    return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  initVoice();
  loadTasks();
</script>
</body>
</html>
